version: "3.9"

services:
  db:
    image: mariadb:11
    container_name: wp_db
    restart: unless-stopped
    environment:
      - MARIADB_DATABASE=${WP_DB_NAME}
      - MARIADB_USER=${WP_DB_USER}
      - MARIADB_PASSWORD=${WP_DB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${WP_DB_ROOT_PASSWORD}
      - TZ=${TZ}
    volumes:
      - ../db/mariadb:/var/lib/mysql
    networks:
      - internal

  wordpress:
    image: wordpress:6.6-apache
    container_name: wordpress
    restart: unless-stopped
    environment:
      - WORDPRESS_DB_HOST=db:3306
      - WORDPRESS_DB_NAME=${WP_DB_NAME}
      - WORDPRESS_DB_USER=${WP_DB_USER}
      - WORDPRESS_DB_PASSWORD=${WP_DB_PASSWORD}
      - TZ=${TZ}
    volumes:
      - ./html:/var/www/html
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wp.rule=Host(`${DOMAIN_ROOT}`) || Host(`www.${DOMAIN_ROOT}`)"
      - "traefik.http.routers.wp.entrypoints=websecure"
      - "traefik.http.routers.wp.tls.certresolver=le"
      - "traefik.http.services.wp.loadbalancer.server.port=80"
    networks:
      - web
      - internal

networks:
  web:
    external: true
    name: web
  internal:
    internal: true
