
services:
  skills_app:
    build:
      context: ./skills
      dockerfile: Dockerfile
    container_name: api_skills_app
    restart: always
      #volumes:
      #- ./skills:/var/www
    networks:
      - web

  skills_nginx:
    image: nginx:alpine
    container_name: api_skills_web
    restart: always
    depends_on:
      - skills_app
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/api-skills.conf:ro
      - ./skills:/var/www
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-skills.rule=Host(`api.skills.novasysia.com`)"
      - "traefik.http.routers.api-skills.entrypoints=websecure"
      - "traefik.http.routers.api-skills.tls=true"
      - "traefik.http.routers.api-skills.tls.certresolver=le"
      - "traefik.http.services.api-skills.loadbalancer.server.port=80"
networks:
  web:
    external: true
